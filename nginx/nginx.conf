# Nginx acts as the entry point for the whole system, distributing requests
# across our 3 API instances round-robin.

events {
    worker_connections 1024;
}

http {
    upstream ratelimiter_cluster {
        # least_conn sends each new request to whichever instance currently
        # has the fewest open connections - a more realistic simulation of
        # production traffic distribution than plain round-robin.
        least_conn;

        server api-1:8080;
        server api-2:8080;
        server api-3:8080;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://ratelimiter_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Fail fast: if an api instance is slow/down, don't let Nginx
            # sit around waiting - the whole point of this system is speed.
            proxy_connect_timeout 2s;
            proxy_read_timeout 5s;
        }
    }
}
